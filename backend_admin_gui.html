<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCare Backend Admin - Advanced Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 min-h-screen">
    <nav class="bg-white/10 backdrop-blur-xl shadow-2xl border-b border-blue-500/30 fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center mr-4 shadow-xl">
                        <i class="bi bi-cpu text-white text-xl font-bold"></i>
                    </div>
                    <h1 class="text-2xl font-black text-white">Backend Admin v2.0</h1>
                </div>
                <div class="flex items-center space-x-4 text-blue-200">
                    <span id="status-indicator" class="px-3 py-1 rounded-full text-sm font-bold bg-green-500/20 border border-green-500/50 text-green-300 hidden">Live</span>
                    <i class="bi bi-bell text-xl hover:text-blue-300 cursor-pointer"></i>
                    <div class="w-8 h-8 bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full flex items-center justify-center cursor-pointer shadow-lg hover:shadow-xl">
                        <i class="bi bi-person text-white"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-24 pb-12 max-w-7xl mx-auto px-6">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="stat-card bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl hover:shadow-blue-500/25 transition-all duration-300 hover:-translate-y-1">
                <div class="flex items-center">
                    <div class="w-16 h-16 bg-gradient-to-r from-emerald-500 to-green-600 rounded-2xl flex items-center justify-center mr-6 shadow-xl">
                        <i class="bi bi-graph-up text-white text-2xl"></i>
                    </div>
                    <div>
                        <div class="text-3xl font-black text-white mb-1" id="scans-today">1,247</div>
                        <div class="text-blue-300 font-medium">Scans Today</div>
                    </div>
                </div>
            </div>

            <div class="stat-card bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl hover:shadow-blue-500/25 transition-all duration-300 hover:-translate-y-1">
                <div class="flex items-center">
                    <div class="w-16 h-16 bg-gradient-to-r from-orange-500 to-red-600 rounded-2xl flex items-center justify-center mr-6 shadow-xl">
                        <i class="bi bi-exclamation-triangle text-white text-2xl"></i>
                    </div>
                    <div>
                        <div class="text-3xl font-black text-orange-400 mb-1" id="alerts-active">23</div>
                        <div class="text-blue-300 font-medium">Active Alerts</div>
                    </div>
                </div>
            </div>

            <div class="stat-card bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl hover:shadow-blue-500/25 transition-all duration-300 hover:-translate-y-1">
                <div class="flex items-center">
                    <div class="w-16 h-16 bg-gradient-to-r from-purple-500 to-violet-600 rounded-2xl flex items-center justify-center mr-6 shadow-xl">
                        <i class="bi bi-cpu text-white text-2xl"></i>
                    </div>
                    <div>
                        <div class="text-3xl font-black text-purple-400 mb-1" id="model-acc">96.8%</div>
                        <div class="text-blue-300 font-medium">Model Accuracy</div>
                    </div>
                </div>
            </div>

            <div class="stat-card bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl hover:shadow-blue-500/25 transition-all duration-300 hover:-translate-y-1">
                <div class="flex items-center">
                    <div class="w-16 h-16 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center mr-6 shadow-xl">
                        <i class="bi bi-check-circle text-white text-2xl"></i>
                    </div>
                    <div>
                        <div class="text-3xl font-black text-emerald-400 mb-1" id="uptime">99.9%</div>
                        <div class="text-blue-300 font-medium">Uptime 24h</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl">
                <h3 class="text-xl font-bold text-white mb-6 flex items-center">
                    <i class="bi bi-bar-chart-line mr-3 text-blue-400 text-xl"></i> Disease Trends
                </h3>
                <canvas id="diseaseChart" height="300"></canvas>
            </div>

            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-blue-500/30 shadow-2xl">
                <h3 class="text-xl font-bold text-white mb-6 flex items-center">
                    <i class="bi bi-speedometer2 mr-3 text-blue-400 text-xl"></i> Live Metrics
                </h3>
                <canvas id="metricsChart" height="300"></canvas>
            </div>
        </div>

        <!-- Controls & Training -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Model Training -->
            <div class="bg-gradient-to-br from-purple-600 to-violet-700 rounded-3xl p-8 shadow-2xl border border-purple-500/50 hover:shadow-purple-500/50 transition-all duration-300">
                <h4 class="text-2xl font-black text-white mb-6 flex items-center">
                    <i class="bi bi-cpu mr-3 text-purple-300 text-2xl"></i> ML Training
                </h4>
                <div class="space-y-4">
                    <button class="w-full p-4 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-bold border border-white/30 transition-all">
                        <i class="bi bi-cloud-upload mr-2"></i> Upload Dataset
                    </button>
                    <button class="w-full p-4 bg-emerald-500/90 hover:bg-emerald-600 rounded-2xl text-white font-bold shadow-lg hover:shadow-emerald-500/50 transition-all">
                        <i class="bi bi-play-circle mr-2"></i> Start Training
                    </button>
                    <div class="text-sm text-purple-200">
                        <i class="bi bi-clock mr-1"></i> ETA: 45 min | GPU: NVIDIA RTX
                    </div>
                </div>
            </div>

            <!-- IoT Control -->
            <div class="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-3xl p-8 shadow-2xl border border-emerald-500/50 hover:shadow-emerald-500/50 transition-all duration-300">
                <h4 class="text-2xl font-black text-white mb-6 flex items-center">
                    <i class="bi bi-thermometer-half mr-3 text-emerald-300 text-2xl"></i> IoT Sensors
                </h4>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between items-center p-3 bg-white/20 rounded-xl">
                        <span class="text-emerald-200">🌡️ Temp</span>
                        <span class="font-bold text-white">28.2°C</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-white/20 rounded-xl">
                        <span class="text-emerald-200">💧 Humidity</span>
                        <span class="font-bold text-white">72%</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-white/20 rounded-xl">
                        <span class="text-emerald-200">🌱 Soil</span>
                        <span class="font-bold text-white">65%</span>
                    </div>
                    <button class="w-full p-3 bg-white/30 hover:bg-white/50 rounded-xl text-white font-bold border transition-all">
                        <i class="bi bi-arrow-clockwise mr-2"></i> Refresh Sensors
                    </button>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="bg-gradient-to-br from-orange-500 to-red-600 rounded-3xl p-8 shadow-2xl border border-orange-500/50 hover:shadow-orange-500/50 transition-all duration-300">
                <h4 class="text-2xl font-black text-white mb-6 flex items-center">
                    <i class="bi bi-lightning-charge mr-3 text-orange-300 text-2xl"></i> Quick Actions
                </h4>
                <div class="space-y-3">
                    <button class="w-full p-4 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-bold border border-white/30 flex items-center justify-center transition-all">
                        <i class="bi bi-play-circle mr-2"></i> Run Inference
                    </button>
                    <button class="w-full p-4 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-bold border border-white/30 flex items-center justify-center transition-all">
                        <i class="bi bi-arrow-repeat mr-2"></i> Retrain Model
                    </button>
                    <button class="w-full p-4 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-bold border border-white/30 flex items-center justify-center transition-all">
                        <i class="bi bi-download mr-2"></i> Export Reports
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Live data fetching
        const API_BASE = 'http://localhost:8010';
        
        // Charts
        const diseaseCtx = document.getElementById('diseaseChart').getContext('2d');
        new Chart(diseaseCtx, {
            type: 'doughnut',
            data: {
                labels: ['Early Blight', 'Powdery Mildew', 'Healthy', 'Other'],
                datasets: [{ data: [45, 25, 20, 10], backgroundColor: ['#ef4444', '#f59e0b', '#10b981', '#6b7280'] }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });

        const metricsCtx = document.getElementById('metricsChart').getContext('2d');
        new Chart(metricsCtx, {
            type: 'line',
            data: {
                labels: ['1h', '2h', '3h', '4h', '5h'],
                datasets: [{
                    label: 'Accuracy %',
                    data: [96.2, 96.8, 97.1, 96.5, 97.3],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } }, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
        });

        // Status check
        axios.get(`${API_BASE}/health`).then(() => {
            document.getElementById('status-indicator').classList.remove('hidden');
        }).catch(() => {
            document.getElementById('status-indicator').textContent = 'Offline';
            document.getElementById('status-indicator').classList.add('bg-red-500/20', 'border-red-500/50', 'text-red-300');
            document.getElementById('status-indicator').classList.remove('hidden');
        });

        // Stats update
        setInterval(() => {
            document.getElementById('scans-today').textContent = (Math.floor(Math.random() * 500) + 1000).toLocaleString();
        }, 5000);
    </script>
</body>
</html>
